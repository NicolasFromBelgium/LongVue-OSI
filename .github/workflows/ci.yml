name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scrapy  # Explicit for safety
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run tests with pytest
        run: pytest
      - name: Lint with ruff
        run: ruff check .
      - name: Format check with black
        run: black --check .
      - name: Type check with mypy
        run: mypy .

  db-init:  # Optional; remove if tests handle init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package
        run: |
          pip install -e .
          pip install scrapy  # If needed, but with lazy import, not required for init_db
      - name: Initialize DB
        run: python -m longvue_osi.main init_db  # Added args

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt  # Si tu as des deps de test comme pytest
      - name: Run tests with pytest
        run: pytest
      - name: Lint with ruff
        run: ruff check .
      - name: Format check with black
        run: black --check .
      - name: Type check with mypy
        run: mypy .

  # Optionnel : Ajoute une job pour init DB si tes tests en ont besoin
  db-init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package
        run: pip install -e .
      - name: Initialize DB
        run: python -m longvue_osi.main  # Ou ton entry point pour init DB
